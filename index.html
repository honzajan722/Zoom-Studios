<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Studios</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .gui-container {
            width: 400px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .gui-header {
            background-color: #0056b3;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .gui-body {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .gui-button {
            background-color: #007bff;
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .gui-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="gui-container">
        <div class="gui-header">Zoom Studios</div>
        <div class="gui-body">
            <button class="gui-button">Spustit projekt</button>
            <button class="gui-button">Nastavení</button>
            <button class="gui-button">Konec</button>
        </div>
    </div>

</body>
</html>
